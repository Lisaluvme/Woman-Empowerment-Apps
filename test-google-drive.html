<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Integration Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
        }
        
        .status-item:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            font-weight: 500;
        }
        
        .status-value {
            font-family: monospace;
            font-size: 12px;
            color: #4a5568;
        }
        
        .btn {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin: 10px 5px;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn.secondary {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
        }
        
        .btn.success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }
        
        .btn.danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }
        
        .log {
            background: #1a202c;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
            border-bottom: 1px solid #2d3748;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-entry.success { color: #68d391; }
        .log-entry.error { color: #feb2b2; }
        .log-entry.info { color: #90cdf4; }
        
        .file-input {
            margin: 15px 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Google Drive Integration Test</h1>
        
        <div class="status-box">
            <h3>System Status</h3>
            <div class="status-item">
                <span class="status-label">Google API Client:</span>
                <span id="gapi-status" class="status-value">Not loaded</span>
            </div>
            <div class="status-item">
                <span class="status-label">Google Identity:</span>
                <span id="gis-status" class="status-value">Not initialized</span>
            </div>
            <div class="status-item">
                <span class="status-label">Drive API:</span>
                <span id="drive-status" class="status-value">Not loaded</span>
            </div>
            <div class="status-item">
                <span class="status-label">Auth Token:</span>
                <span id="token-status" class="status-value">No token</span>
            </div>
        </div>
        
        <div style="text-align: center;">
            <button class="btn" onclick="initGoogleServices()">Initialize Google Services</button>
            <button class="btn secondary" onclick="connectGoogleDrive()">Connect Google Drive</button>
            <button class="btn success" onclick="testFileUpload()">Test File Upload</button>
            <button class="btn danger" onclick="clearLog()">Clear Log</button>
        </div>
        
        <div class="file-input">
            <label>Or upload a file to test:</label>
            <input type="file" id="test-file" accept="image/*,application/pdf" style="margin-top: 10px;">
            <button class="btn" onclick="uploadTestFile()">Upload Selected File</button>
        </div>
        
        <div class="log" id="log">
            <div class="log-entry info">Test page loaded. Click 'Initialize Google Services' to begin.</div>
        </div>
    </div>

    <!-- Load Google APIs -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <script>
        // Global variables to track state
        let gapiLoaded = false;
        let gisInited = false;
        let driveApiLoaded = false;
        let accessToken = null;
        let tokenClient = null;
        
        // Configuration
        const GOOGLE_CLIENT_ID = '947408696329-q16v2l7ci2j8r804516pmbit208j8rm6.apps.googleusercontent.com';
        const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
        const DRIVE_API_URL = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateStatus() {
            document.getElementById('gapi-status').textContent = gapiLoaded ? '✅ Loaded' : '❌ Not loaded';
            document.getElementById('gis-status').textContent = gisInited ? '✅ Initialized' : '❌ Not initialized';
            document.getElementById('drive-status').textContent = driveApiLoaded ? '✅ Loaded' : '❌ Not loaded';
            document.getElementById('token-status').textContent = accessToken ? '✅ Available' : '❌ No token';
        }

        // Load gapi.client
        async function loadGapiClient() {
            return new Promise((resolve, reject) => {
                if (gapiLoaded && window.gapi && window.gapi.client) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://apis.google.com/js/api.js';
                script.onload = () => {
                    gapi.load('client', () => {
                        gapiLoaded = true;
                        log('Google API client loaded', 'success');
                        updateStatus();
                        resolve();
                    });
                };
                script.onerror = () => {
                    log('Failed to load Google API script', 'error');
                    reject(new Error('Failed to load Google API script'));
                };
                document.head.appendChild(script);
            });
        }

        // Initialize Google Identity Services
        async function initializeGoogleIdentity() {
            return new Promise((resolve, reject) => {
                if (gisInited) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.onload = () => {
                    try {
                        tokenClient = google.accounts.oauth2.initTokenClient({
                            client_id: GOOGLE_CLIENT_ID,
                            scope: DRIVE_SCOPE,
                            ux_mode: 'popup',
                            callback: (response) => {
                                if (response.access_token) {
                                    accessToken = response.access_token;
                                    gapi.client.setToken({ access_token: response.access_token });
                                    log('✅ Access token received and set', 'success');
                                    localStorage.setItem('google_calendar_token', response.access_token);
                                    localStorage.setItem('google_token_expires_at', Date.now() + (response.expires_in * 1000));
                                    updateStatus();
                                } else if (response.error) {
                                    log(`❌ OAuth error: ${response.error_description || response.error}`, 'error');
                                    reject(new Error(response.error_description || response.error));
                                }
                            },
                            error_callback: (error) => {
                                log(`❌ OAuth error: ${error.error || error}`, 'error');
                                reject(error);
                            }
                        });
                        gisInited = true;
                        log('Google Identity Services initialized', 'success');
                        updateStatus();
                        resolve();
                    } catch (error) {
                        log(`❌ Error initializing Google Identity: ${error.message}`, 'error');
                        reject(error);
                    }
                };
                script.onerror = () => {
                    log('Failed to load Google Identity script', 'error');
                    reject(new Error('Failed to load Google Identity script'));
                };
                document.head.appendChild(script);
            });
        }

        // Load Drive API
        async function loadDriveApi() {
            if (driveApiLoaded && gapi.client.drive) {
                return;
            }

            try {
                await gapi.client.load(DRIVE_API_URL);
                driveApiLoaded = true;
                log('Google Drive API loaded', 'success');
                updateStatus();
            } catch (error) {
                log(`❌ Failed to load Drive API: ${error.message}`, 'error');
                throw error;
            }
        }

        // Initialize all Google services
        async function initGoogleServices() {
            try {
                log('Initializing Google services...');
                await loadGapiClient();
                await initializeGoogleIdentity();
                log('✅ Google services initialized successfully', 'success');
            } catch (error) {
                log(`❌ Failed to initialize Google services: ${error.message}`, 'error');
            }
        }

        // Connect to Google Drive (request OAuth)
        async function connectGoogleDrive() {
            if (!gisInited) {
                log('❌ Google Identity not initialized. Please initialize first.', 'error');
                return;
            }

            try {
                log('Requesting Google Drive access...');
                tokenClient.requestAccessToken({
                    prompt: 'consent',
                    callback: async (response) => {
                        if (response.access_token) {
                            log('✅ Google Drive access granted', 'success');
                            await loadDriveApi();
                        }
                    }
                });
            } catch (error) {
                log(`❌ Failed to connect to Google Drive: ${error.message}`, 'error');
            }
        }

        // Upload a test file
        async function testFileUpload() {
            if (!accessToken) {
                log('❌ No access token. Please connect Google Drive first.', 'error');
                return;
            }

            if (!driveApiLoaded) {
                log('❌ Drive API not loaded. Please connect Google Drive first.', 'error');
                return;
            }

            try {
                log('Creating test image...');
                
                // Create a simple test image
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 300;
                const ctx = canvas.getContext('2d');
                
                // Draw gradient background
                const gradient = ctx.createLinearGradient(0, 0, 400, 300);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 400, 300);
                
                // Add text
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Test Document', 200, 150);
                ctx.font = '16px Arial';
                ctx.fillText('Uploaded via Document Vault', 200, 180);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                const base64Data = imageData.split(',')[1];

                log('Uploading test image to Google Drive...');
                
                // Upload using multipart
                const boundary = '-------314159265358979323846';
                const delimiter = "\r\n--" + boundary + "\r\n";
                const close_delim = "\r\n--" + boundary + "--";

                const fileMetadata = {
                    name: 'test-document-vault.jpg',
                    description: JSON.stringify({
                        category: 'test',
                        uploadedAt: new Date().toISOString(),
                        source: 'DocumentVaultTest'
                    }),
                    parents: ['root'] // Will be updated to use folder in production
                };

                const multipartRequestBody =
                    delimiter +
                    'Content-Type: application/json\r\n\r\n' +
                    JSON.stringify(fileMetadata) +
                    delimiter +
                    'Content-Type: image/jpeg\r\n' +
                    'Content-Transfer-Encoding: base64\r\n\r\n' +
                    base64Data +
                    close_delim;

                const response = await fetch(
                    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'multipart/related; boundary="' + boundary + '"'
                        },
                        body: multipartRequestBody
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `Upload failed: ${response.status} ${response.statusText}`);
                }

                const result = await response.json();
                log(`✅ Test file uploaded successfully!`, 'success');
                log(`File ID: ${result.id}`, 'info');
                log(`View Link: ${result.webViewLink}`, 'info');
                
                // Test download URL
                const downloadResponse = await gapi.client.drive.files.get({
                    fileId: result.id,
                    fields: 'webContentLink'
                });
                
                log(`Download Link: ${downloadResponse.result.webContentLink}`, 'info');
                
            } catch (error) {
                log(`❌ Test upload failed: ${error.message}`, 'error');
            }
        }

        // Upload selected file
        async function uploadTestFile() {
            const fileInput = document.getElementById('test-file');
            const file = fileInput.files[0];
            
            if (!file) {
                log('❌ Please select a file first', 'error');
                return;
            }

            if (!accessToken) {
                log('❌ No access token. Please connect Google Drive first.', 'error');
                return;
            }

            if (!driveApiLoaded) {
                log('❌ Drive API not loaded. Please connect Google Drive first.', 'error');
                return;
            }

            try {
                log(`Uploading ${file.name} (${file.type})...`);
                
                // Convert file to base64
                const reader = new FileReader();
                const base64Promise = new Promise((resolve, reject) => {
                    reader.onload = () => {
                        const content = reader.result.split(',')[1];
                        resolve(content);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                const base64Data = await base64Promise;
                const contentType = file.type || 'application/octet-stream';

                // Upload using multipart
                const boundary = '-------314159265358979323846';
                const delimiter = "\r\n--" + boundary + "\r\n";
                const close_delim = "\r\n--" + boundary + "--";

                const fileMetadata = {
                    name: file.name,
                    description: JSON.stringify({
                        category: 'test',
                        uploadedAt: new Date().toISOString(),
                        source: 'DocumentVaultTest'
                    }),
                    parents: ['root'] // Will be updated to use folder in production
                };

                const multipartRequestBody =
                    delimiter +
                    'Content-Type: application/json\r\n\r\n' +
                    JSON.stringify(fileMetadata) +
                    delimiter +
                    'Content-Type: ' + contentType + '\r\n' +
                    'Content-Transfer-Encoding: base64\r\n\r\n' +
                    base64Data +
                    close_delim;

                const response = await fetch(
                    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'multipart/related; boundary="' + boundary + '"'
                        },
                        body: multipartRequestBody
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `Upload failed: ${response.status} ${response.statusText}`);
                }

                const result = await response.json();
                log(`✅ File uploaded successfully!`, 'success');
                log(`File ID: ${result.id}`, 'info');
                log(`View Link: ${result.webViewLink}`, 'info');
                
            } catch (error) {
                log(`❌ File upload failed: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared', 'info');
        }

        // Auto-initialize when page loads
        window.onload = () => {
            log('Page loaded. Ready to test Google Drive integration.', 'info');
        };
    </script>
</body>
</html>
